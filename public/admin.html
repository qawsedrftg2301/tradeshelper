<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin: User List</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="user-box" style="max-width: 500px; margin-bottom: 2em; text-align: center; display: flex; align-items: center; justify-content: center;">
    <span style="font-size:2rem; font-weight:600;">Admin: User List</span>
  </div>
  <button onclick="loadUsers()">Refresh</button>
  <ul id="user-list"></ul>

  <style>
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-size: 1.5rem;
    background: url('/background.png') no-repeat center center fixed;
    background-size: cover;
  }
  h1 { color: #2d3a4b; margin-bottom: 0.5em; }
  button { background: #6366f1; color: #fff; border: none; border-radius: 6px; padding: 0.5em 1.2em; margin: 0.5em; font-size: 1.1rem; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #4338ca; }
  li, .user-box { border: 2px solid #6366f1; border-radius: 10px; padding: 1em; margin: 1em 0; background: #fff; width: 350px; box-shadow: 0 2px 8px rgba(99,102,241,0.08); list-style: none; }
  </style>

  <script>
  async function loadUsers() {
    const res = await fetch('/api/admin/users');
    const text = await res.text();
    let users = [];
    try {
      users = JSON.parse(text);
    } catch (e) {
      document.getElementById('user-list').innerHTML = '<li>Failed to load users</li>';
      return;
    }
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach(u => {
      const li = document.createElement('li');
      li.innerHTML = `
        <span>${u.email}</span>
        <button onclick="editUser('${u._id}')">Edit</button>
        <button onclick="deleteUser('${u._id}')">Delete</button>
      `;
      list.appendChild(li);
    });
  }

  async function deleteUser(id) {
    if (!confirm('Are you sure you want to delete this user?')) return;
    await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
    loadUsers();
  }

  function editUser(id) {
    const newEmail = prompt('Enter new email:');
    if (!newEmail) return;
    fetch(`/api/admin/users/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: newEmail })
    }).then(loadUsers);
  }

  // Load users automatically on page load
  window.onload = loadUsers;
  </script>
</body>
</html>
